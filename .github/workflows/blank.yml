name: Free Windows 11 RDP
on: workflow_dispatch

jobs:
  launch-windows:
    runs-on: windows-latest
    steps:
      - name: Install ngrok via Chocolatey
        run: |
          choco install ngrok -y

      - name: Configure ngrok Token
        run: |
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Enable Remote Desktop (RDP) Ports
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: Create Custom RDP User (uk)
        shell: cmd
        run: |
          # ইউজারনেম 'uk' এবং পাসওয়ার্ড 'Uk@2026' অ্যাকাউন্ট তৈরি করা
          net user uk Uk@2026 /add
          net localgroup Administrators uk /add
          net localgroup "Remote Desktop Users" uk /add

      - name: Start Safe RDP Tunnel
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389"
          Write-Host "RDP Server Started Successfully with credentials uk/Uk@2026"
          Start-Sleep -Seconds 21600 # সেশনটি ৬ ঘণ্টা সচল থাকবে
