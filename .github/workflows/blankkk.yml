name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ngrok via Snap Store
        run: |
          sudo snap install ngrok

      - name: Boot Official Kali Linux with GUI and RDP
        run: |
          # কালির অফিশিয়াল এবং সচল ইমেজ দিয়ে কন্টেইনার চালু করা
          sudo docker run -d --name kali-desktop --privileged -p 3389:3389 kalilinux/kali-rolling sleep infinity
          
          # কন্টেইনারের ভেতরে ব্যাকগ্রাউন্ডে গ্রাফিক্যাল ডেক্সটপ ও RDP সার্ভার ইনস্টল করা
          sudo docker exec kali-desktop apt-get update
          sudo docker exec kali-desktop apt-get install -y kali-desktop-xfce xrdp dbus-x11
          
          # ইউজারনেম 'uk' এবং পাসওয়ার্ড 'Uk@2026' সেটআপ করা
          sudo docker exec kali-desktop useradd -m -s /bin/bash uk
          sudo docker exec kali-desktop sh -c "echo 'uk:Uk@2026' | chpasswd"
          sudo docker exec kali-desktop usermod -aG sudo uk
          
          # xrdp সার্ভিস কনফিগার ও স্টার্ট করা
          sudo docker exec kali-desktop sed -i 's/3389/3389/g' /etc/xrdp/xrdp.ini
          sudo docker exec kali-desktop service xrdp start
          
          echo "Waiting for Kali Linux GUI System to stabilize..."
          sleep 10

      - name: Start Safe RDP Tunnel (No Config File)
        run: |
          # সরাসরি ইনলাইন টোকেন দিয়ে RDP টানেল চালু করা
          sudo ngrok tcp 3389 --authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
