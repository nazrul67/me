name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Force Clean Broken Repositories
        run: |
          # এরর দেওয়া সমস্ত পুরনো ব্রোকেন সোর্স ফাইল লিনাক্স সিস্টেম থেকে সম্পূর্ণ ডিলিট করা
          sudo rm -f /etc/apt/sources.list.d/*
          sudo apt-get clean

      - name: Install Secure ngrok via Static Binary
        run: |
          # apt-get বাদ দিয়ে সরাসরি অফিশিয়াল লিনাক্স বাইনারি দিয়ে ১ সেকেন্ডে ngrok নামানো
          wget -q https://equinox.io
          tar -xf ngrok-v3-stable-linux-amd64.tgz
          sudo mv ngrok /usr/local/bin/

      - name: Configure ngrok Token
        run: |
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Boot Kali Linux Graphical OS
        run: |
          # ব্যাকগ্রাউন্ডে রিয়েল কালির ওএস চালু করা (Username: uk, Password: Uk@2026)
          sudo docker run -d -p 3389:3389 --name kali-desktop \
            -e USER=uk -e PASSWORD=Uk@2026 \
            -e ROOT=true -e RESOLUTION=1920x1080 \
            danielguerra/kali-xrdp

          echo "Waiting for Kali OS to load setup..."
          sleep 15

      - name: Start Safe RDP Tunnel
        run: |
          # সরাসরি কালি ওএস পোর্টের সাথে ngrok কানেক্ট করা
          ngrok tcp 3389
