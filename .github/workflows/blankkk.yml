name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ngrok via Snap Store
        run: |
          # কোনো ডাউনলোড লিঙ্ক বা জিপ ফাইলের ঝামেলা ছাড়া সরাসরি অফিশিয়াল স্ন্যাপ দিয়ে ngrok ইনস্টল করা
          sudo snap install ngrok

      - name: Configure ngrok Token
        run: |
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Boot Kali Linux Graphical OS
        run: |
          # ব্যাকগ্রাউন্ডে রিয়েল কালির ওএস চালু করা (Username: uk, Password: Uk@2026)
          sudo docker run -d -p 3389:3389 --name kali-desktop \
            -e USER=uk -e PASSWORD=Uk@2026 \
            -e ROOT=true -e RESOLUTION=1920x1080 \
            danielguerra/kali-xrdp

          echo "Waiting for Kali OS to load setup..."
          sleep 15

      - name: Start Safe RDP Tunnel
        run: |
          # সরাসরি কালি ওএস পোর্টের সাথে ngrok কানেক্ট করা
          ngrok tcp 3389
