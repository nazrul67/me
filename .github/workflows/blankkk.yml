name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ngrok via Snap Store
        run: |
          sudo snap install ngrok

      - name: Boot Pre-Configured Kali Linux GUI (No Black Screen)
        run: |
          # প্রি-বিল্ট xrdp যুক্ত লিনাক্স ইমেজ রান করা
          sudo docker run -d --name kali-desktop --privileged -p 3389:3389 \
            -e USER=uk -e PASSWORD=Uk@2026 \
            -e RESOLUTION=1920x1080 \
            scottyhardy/kali-linux-xrdp:latest
          
          echo "Waiting 20 seconds for window manager to load..."
          sleep 20

      - name: Start Safe RDP Tunnel (No Config File)
        run: |
          # ইনলাইন টোকেন দিয়ে RDP টানেল চালু করা
          sudo ngrok tcp 3389 --authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
