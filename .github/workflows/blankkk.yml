name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ngrok via Snap Store
        run: |
          sudo snap install ngrok

      - name: Boot Certified Kali Linux GUI Server
        run: |
          # অফিশিয়াল লিনাক্স-সার্ভার কালির ইমেজ রান করা (এটি কখনো ডিলিট বা অ্যাক্সেস ডেনাইড হবে না)
          # এটি বিল্ট-ইন RDP প্রোটোকল এবং গ্রাফিক্যাল ডেস্কটপ সাপোর্ট করে
          sudo docker run -d --name kali-os --privileged \
            -p 3389:3389 \
            -e PUID=1000 -e PGID=1000 \
            -e TZ=Asia/Dhaka \
            -e USERNAME=uk -e PASSWORD=Uk@2026 \
            linuxserver/kali-linux:latest

          echo "Waiting 20 seconds for certified Kali system configuration..."
          sleep 20

      - name: Start Safe RDP Tunnel (No Config File)
        run: |
          # ইনলাইন টোকেন দিয়ে RDP পোর্টে ngrok টানেল অন করা
          sudo ngrok tcp 3389 --authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
