name: Free Kali Linux RDP
on: workflow_dispatch

jobs:
  launch-kali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ngrok via Snap Store
        run: |
          sudo snap install ngrok

      - name: Boot Fully Configured Kali Linux GUI
        run: |
          # কালির অফিসিয়াল এবং প্রি-কনফিগারড xrdp কন্টেইনার রান করা
          # এটি সরাসরি ডেস্কটপ এনভায়রনমেন্ট সহ বুট হবে, ফলে কোনো ব্ল্যাক স্ক্রিন আসবে না
          sudo docker run -d --name kali-desktop -p 3389:3389 --privileged \
            -e USER=uk -e PASSWORD=Uk@2026 \
            kalilinux/kali-rolling:latest sh -c "apt-get update && apt-get install -y kali-desktop-xfce xrdp && useradd -m -s /bin/bash uk && echo 'uk:Uk@2026' | chpasswd && adduser uk sudo && echo 'xfce4-session' > /home/uk/.xsession && chown uk:uk /home/uk/.xsession && service xrdp start && sleep infinity"
          
          echo "Waiting 30 seconds for complete desktop layout generation..."
          sleep 30

      - name: Start Safe RDP Tunnel (No Config File)
        run: |
          # ইনলাইন টোকেন দিয়ে RDP টানেল চালু করা
          sudo ngrok tcp 3389 --authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
